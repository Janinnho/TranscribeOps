# SECRET_KEY must be set to a long random string in your environment or .env file
# before starting. Example: SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
x-common-env: &common-env
  - SECRET_KEY=${SECRET_KEY}
  - DATABASE_URL=sqlite:////app/data/transcribeops.db
  - REDIS_URL=redis://redis:6379/0

services:
  web:
    build: .
    ports:
      - "5050:5000"
    volumes:
      - db_data:/app/data
      - upload_data:/app/app/static/uploads
    environment: *common-env
    depends_on:
      - redis
    networks:
      - default
      - transcribeops
    restart: unless-stopped

  worker:
    build: .
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    volumes:
      - db_data:/app/data
      - upload_data:/app/app/static/uploads
    environment: *common-env
    depends_on:
      - redis
    networks:
      - default
      - transcribeops
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  db_data:
  upload_data:
  redis_data:

networks:
  transcribeops:
    external: true
    name: transcribeops-shared
