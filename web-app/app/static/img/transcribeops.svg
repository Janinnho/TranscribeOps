<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Soundwave bars (centered, representing audio/transcription) -->
  <g fill="white">
    <!-- Bar 1 (left) -->
    <rect x="96" y="208" width="36" height="96" rx="18"/>
    <!-- Bar 2 -->
    <rect x="160" y="148" width="36" height="216" rx="18"/>
    <!-- Bar 3 (center, tallest) -->
    <rect x="238" y="108" width="36" height="296" rx="18"/>
    <!-- Bar 4 -->
    <rect x="316" y="148" width="36" height="216" rx="18"/>
    <!-- Bar 5 (right) -->
    <rect x="380" y="208" width="36" height="96" rx="18"/>
  </g>
</svg>
