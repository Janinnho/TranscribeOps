# TranscribeOps — Docker Compose configuration
#
# Copy this file to docker-compose.yml and adjust the values:
#   cp docker-compose.example.yml docker-compose.yml
#
# At minimum, SECRET_KEY must be set in .env!
#
# Default ports (published on the host):
#   5000 → Web UI            (http://localhost:5000)
#   8000 → Whisper API + Admin UI (http://localhost:8000)
#
# Redis is not published; it stays internal to the Docker network.
# Whisper instance workers (managed via the admin UI) are container-internal
# (localhost-only, ports 8100-8120). All requests go through port 8000 — the
# model is selected via the `model` parameter (instance name = alias).

services:
  web:
    build: ./web-app
    container_name: transcribeops-web
    ports:
      - "5000:5000"
    volumes:
      - transcribeops-db:/app/data
      - transcribeops-uploads:/app/app/static/uploads
      # Optional: external audio storage (e.g. NFS mount, network share)
      # - /path/to/audio-storage:/app/audio_storage
      - transcribeops-audio:/app/audio_storage
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:////app/data/transcribeops.db
      - REDIS_URL=redis://redis:6379/0
      - AUDIO_STORAGE_PATH=/app/audio_storage
    depends_on:
      - redis
    restart: always

  worker:
    build: ./web-app
    container_name: transcribeops-worker
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=8
    volumes:
      - transcribeops-db:/app/data
      - transcribeops-uploads:/app/app/static/uploads
      # Must match the web service.
      # - /path/to/audio-storage:/app/audio_storage
      - transcribeops-audio:/app/audio_storage
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:////app/data/transcribeops.db
      - REDIS_URL=redis://redis:6379/0
      - AUDIO_STORAGE_PATH=/app/audio_storage
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: transcribeops-redis
    volumes:
      - transcribeops-redis:/data
    restart: always

  whisper:
    build: ./whisper-api
    container_name: transcribeops-whisper
    ports:
      # Single entry point: API + model router + admin UI. Instance workers
      # bind to localhost inside the container and are reached via the
      # `model` parameter — no extra ports needed.
      - "8000:8000"
    environment:
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
      - WHISPER_MODEL=medium
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_BATCH_SIZE=16
      - HF_TOKEN=${HF_TOKEN:-}
      # Admin UI reachable at http://<host>:8000/admin
      # Leave empty to disable the admin UI. Set any password to enable.
      - ADMIN_PASSWORD=${WHISPER_ADMIN_PASSWORD:-}
      - ADMIN_SESSION_SECRET=${WHISPER_ADMIN_SESSION_SECRET:-}
      # Port range for instance workers managed via the admin UI.
      - INSTANCE_PORT_RANGE=8100-8120
    volumes:
      - transcribeops-whisper-cache:/root/.cache
    restart: always

volumes:
  transcribeops-db:
  transcribeops-uploads:
  transcribeops-redis:
  transcribeops-whisper-cache:
  transcribeops-audio:
